<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts - LifeOS</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .mood-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .mood-option {
            font-size: 2.5rem;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s;
            padding: 0.5rem;
            border-radius: 50%;
        }
        .mood-option:hover {
            opacity: 0.7;
            transform: scale(1.1);
        }
        .mood-option.selected {
            opacity: 1;
            transform: scale(1.2);
            background: var(--bg-tertiary);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">LifeOS</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-page="dashboard.html">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="notes.html" class="nav-item" data-page="notes.html">
                    <span class="nav-icon">📝</span>
                    <span>Notes</span>
                </a>
                <a href="goals.html" class="nav-item" data-page="goals.html">
                    <span class="nav-icon">🎯</span>
                    <span>Goals</span>
                </a>
                <a href="deadlines.html" class="nav-item" data-page="deadlines.html">
                    <span class="nav-icon">⏰</span>
                    <span>Deadlines</span>
                </a>
                <a href="routines.html" class="nav-item" data-page="routines.html">
                    <span class="nav-icon">🔁</span>
                    <span>Routines</span>
                </a>
                <a href="thoughts.html" class="nav-item" data-page="thoughts.html">
                    <span class="nav-icon">💭</span>
                    <span>Thoughts</span>
                </a>
            </nav>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 class="page-title">Thoughts</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-icon" id="themeToggle">🌙</button>
                <div class="user-menu" id="logoutBtn">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span class="user-name" id="userName">User</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
                <div>
                    <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="margin: 0;">Journal</h2>
                        <button class="btn btn-primary" id="newThoughtBtn">
                            <span>➕</span>
                            <span>New Thought</span>
                        </button>
                    </div>

                    <div id="thoughtsContainer" class="grid grid-1" style="gap: 1rem;">
                        <!-- Thoughts will be loaded here -->
                    </div>

                    <div id="emptyState" class="empty-state hidden">
                        <div class="empty-state-icon">💭</div>
                        <div class="empty-state-title">No thoughts yet</div>
                        <div class="empty-state-text">Start journaling!</div>
                    </div>
                </div>

                <div>
                    <div class="card">
                        <h3 style="margin: 0 0 1rem 0;">Mood Summary (30 days)</h3>
                        <div id="moodChart">
                            <!-- Mood chart will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Thought Modal -->
    <div class="modal-overlay" id="thoughtModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Thought</h2>
                <button class="modal-close">✕</button>
            </div>
            <form id="thoughtForm">
                <div class="form-group">
                    <label class="form-label">How are you feeling?</label>
                    <div class="mood-selector">
                        <div class="mood-option" data-mood="Happy" title="Happy">😊</div>
                        <div class="mood-option selected" data-mood="Neutral" title="Neutral">😐</div>
                        <div class="mood-option" data-mood="Sad" title="Sad">😢</div>
                        <div class="mood-option" data-mood="Anxious" title="Anxious">😰</div>
                        <div class="mood-option" data-mood="Excited" title="Excited">🤩</div>
                    </div>
                    <input type="hidden" id="thoughtMood" value="Neutral">
                </div>

                <div class="form-group">
                    <label class="form-label">What's on your mind?</label>
                    <textarea id="thoughtContent" class="form-textarea" rows="8" required 
                              placeholder="Write freely..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Tags (comma separated)</label>
                    <input type="text" id="thoughtTags" class="form-input" placeholder="work, personal, ideas">
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="thoughtPrivate" checked>
                        <span>🔒 Private (only you can see this)</span>
                    </label>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary modal-close">Cancel</button>
                    <button type="button" class="btn btn-danger hidden" id="deleteThoughtBtn">Delete</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/thoughts.js"></script>
</body>
</html>
