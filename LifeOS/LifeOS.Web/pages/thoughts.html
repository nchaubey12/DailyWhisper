<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thoughts - LifeOS</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        /* Mood picker buttons */
        .mood-option {
            font-size: 1.75rem;
            background: none;
            border: 3px solid transparent;
            border-radius: 50%;
            padding: 0.3rem;
            cursor: pointer;
            transition: border-color 0.15s, transform 0.15s, background 0.15s;
            line-height: 1;
        }
        .mood-option:hover {
            transform: scale(1.15);
            background: var(--bg-tertiary);
        }
        /* selected state — works in both light and dark */
        .mood-option.selected {
            border-color: var(--primary-color, #3b82f6);
            background: var(--bg-tertiary);
            transform: scale(1.2);
        }

        /* Two-column layout for thoughts page */
        .thoughts-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 1.5rem;
            align-items: start;
        }
        @media (max-width: 768px) {
            .thoughts-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">LifeOS</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item" data-page="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a>
                <a href="notes.html"     class="nav-item" data-page="notes.html"><span class="nav-icon">📝</span><span>Notes</span></a>
                <a href="goals.html"     class="nav-item" data-page="goals.html"><span class="nav-icon">🎯</span><span>Goals</span></a>
                <a href="deadlines.html" class="nav-item" data-page="deadlines.html"><span class="nav-icon">⏰</span><span>Deadlines</span></a>
                <a href="routines.html"  class="nav-item" data-page="routines.html"><span class="nav-icon">🔁</span><span>Routines</span></a>
                <a href="thoughts.html"  class="nav-item" data-page="thoughts.html"><span class="nav-icon">💭</span><span>Thoughts</span></a>
                <a href="learning.html"  class="nav-item" data-page="learning.html"><span class="nav-icon">📖</span><span>Learning</span></a>
                <a href="achievements.html" class="nav-item"><span class="nav-icon">🏆</span><span>Achievements</span></a>
                <a href="profile.html"   class="nav-item" data-page="profile.html"><span class="nav-icon">⚙️</span><span>Profile</span></a>
            </nav>
        </aside>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 class="page-title">Thoughts</h1>
            </div>
            <div class="topbar-right">
                <button class="topbar-icon" id="themeToggle">🌙</button>
                <div class="user-menu" id="logoutBtn">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span class="user-name" id="userName">User</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="thoughts-layout">

                <!-- Left: Journal list -->
                <div>
                    <div style="margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;">
                        <h2 style="margin:0;color:var(--text-primary);">Journal</h2>
                        <button class="btn btn-primary" id="newThoughtBtn">➕ New Thought</button>
                    </div>

                    <div id="thoughtsContainer"></div>

                    <div id="emptyState" class="empty-state hidden">
                        <div class="empty-state-icon">💭</div>
                        <div class="empty-state-title">No thoughts yet</div>
                        <div class="empty-state-text">Start journaling — capture how you feel.</div>
                        <button class="btn btn-primary"
                            onclick="document.getElementById('newThoughtBtn').click()">
                            Write First Thought
                        </button>
                    </div>
                </div>

                <!-- Right: Mood summary -->
                <div class="card" style="position:sticky;top:1rem;">
                    <div class="card-header">
                        <h3 class="card-title">Mood Summary (30 days)</h3>
                    </div>
                    <div class="card-content">
                        <div id="moodChart">
                            <p style="text-align:center;color:var(--text-tertiary);font-size:0.85rem;">No mood data yet</p>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ── Thought Modal ─────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="thoughtModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Thought</h2>
                <button class="modal-close">✕</button>
            </div>

            <form id="thoughtForm">
                <!--
                    NOTE: thoughtMood hidden input is kept for backwards compat
                    but thoughts.js now tracks mood in a JS variable (selectedMood)
                    so form.reset() cannot wipe it.
                -->
                <input type="hidden" id="thoughtMood" value="Neutral">

                <!-- Mood picker -->
                <div class="form-group">
                    <label class="form-label">How are you feeling?</label>
                    <div style="display:flex;gap:0.75rem;justify-content:center;padding:0.5rem 0;">
                        <button type="button" class="mood-option" data-mood="Happy"   title="Happy">😊</button>
                        <button type="button" class="mood-option selected" data-mood="Neutral" title="Neutral">😐</button>
                        <button type="button" class="mood-option" data-mood="Sad"     title="Sad">😢</button>
                        <button type="button" class="mood-option" data-mood="Anxious" title="Anxious">😰</button>
                        <button type="button" class="mood-option" data-mood="Excited" title="Excited">🤩</button>
                    </div>
                </div>

                <!-- Content -->
                <div class="form-group">
                    <label class="form-label">What's on your mind? *</label>
                    <textarea id="thoughtContent" class="form-textarea" rows="6"
                        placeholder="Write freely…" required></textarea>
                </div>

                <!-- Tags -->
                <div class="form-group">
                    <label class="form-label">Tags (comma separated)</label>
                    <input type="text" id="thoughtTags" class="form-input"
                        placeholder="work, personal, ideas">
                </div>

                <!-- Private toggle -->
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;">
                        <input type="checkbox" id="thoughtPrivate" checked>
                        🔒 Private (only you can see this)
                    </label>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('thoughtModal').classList.remove('active')">Cancel</button>
                    <button type="button" class="btn btn-danger hidden" id="deleteThoughtBtn">Delete</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/thoughts.js"></script>
</body>
</html>
